name: Deploy to S3 + CloudFront

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Stamp build version
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          COMMIT="${GITHUB_SHA::7}"
          echo "BUILD_VERSION=${VERSION}" >> $GITHUB_ENV
          # Inject version into index.html
          sed -i "s|<!--BUILD_VERSION-->|<div id=\"build-version\" style=\"position:fixed;bottom:4px;right:8px;font-size:10px;color:rgba(255,255,255,0.25);pointer-events:none;z-index:9999;\">v${VERSION} (${COMMIT}) ${TIMESTAMP}</div>|" index.html
          # Also write a version.json for programmatic checks
          echo "{\"version\":\"${VERSION}\",\"commit\":\"${COMMIT}\",\"timestamp\":\"${TIMESTAMP}\"}" > version.json

      - name: Sync to S3
        run: |
          aws s3 sync . s3://www.servicedeskhero.com \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --cache-control "public, max-age=86400"

      - name: Set correct content types
        run: |
          aws s3 cp s3://www.servicedeskhero.com/ s3://www.servicedeskhero.com/ \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=3600"
          aws s3 cp s3://www.servicedeskhero.com/ s3://www.servicedeskhero.com/ \
            --recursive \
            --exclude "*" \
            --include "*.js" \
            --content-type "application/javascript" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=86400"
          aws s3 cp s3://www.servicedeskhero.com/ s3://www.servicedeskhero.com/ \
            --recursive \
            --exclude "*" \
            --include "*.css" \
            --content-type "text/css" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1E5FO0J6V9IIP \
            --paths "/*"
